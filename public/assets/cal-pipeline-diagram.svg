<svg width="960" height="440" viewBox="0 0 960 440" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="440" fill="#ffffff"/>

  <!-- ── TITLE ── -->
  <text x="480" y="38" text-anchor="middle" font-family="Sora, sans-serif" font-size="13" font-weight="700" fill="#0A1628" letter-spacing="1">CONTEXT ASSEMBLY LANGUAGE (CAL)</text>
  <rect x="448" y="46" width="64" height="2.5" rx="1.25" fill="#3B82F6"/>

  <!-- ── BOX 1: Agent / Orchestrator ── -->
  <rect x="149" y="74" width="154" height="84" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <!-- terminal icon -->
  <rect x="208" y="86" width="28" height="22" rx="3" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.3"/>
  <polyline points="213,94 217,98 213,102" stroke="#3B82F6" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="220" y1="102" x2="228" y2="102" stroke="#3B82F6" stroke-width="1.3" stroke-linecap="round"/>
  <text x="226" y="140" text-anchor="middle" font-family="Sora, sans-serif" font-size="10.5" font-weight="700" fill="#1E40AF">Agent / Orchestrator</text>

  <!-- ── ARROW 1 ── -->
  <line x1="303" y1="116" x2="397" y2="116" stroke="#3B82F6" stroke-width="2"/>
  <polygon points="397,111 407,116 397,121" fill="#3B82F6"/>

  <!-- ── BOX 2: OMS Memory Store ── -->
  <rect x="407" y="74" width="154" height="84" rx="10" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5"/>
  <!-- database icon -->
  <ellipse cx="484" cy="90" rx="14" ry="5" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.3"/>
  <path d="M470 90 v7 c0 2.8 6.3 5 14 5 s14-2.2 14-5 v-7" stroke="#16A34A" stroke-width="1.3" fill="none"/>
  <path d="M470 97 v7 c0 2.8 6.3 5 14 5 s14-2.2 14-5 v-7" stroke="#16A34A" stroke-width="1.3" fill="none"/>
  <text x="484" y="140" text-anchor="middle" font-family="Sora, sans-serif" font-size="10.5" font-weight="700" fill="#166534">OMS Memory Store</text>

  <!-- ── ARROW 2 ── -->
  <line x1="561" y1="116" x2="655" y2="116" stroke="#7C3AED" stroke-width="2"/>
  <polygon points="655,111 665,116 655,121" fill="#7C3AED"/>

  <!-- ── BOX 3: LLM Context Window ── -->
  <rect x="665" y="74" width="154" height="84" rx="10" fill="#FDF4FF" stroke="#A855F7" stroke-width="1.5"/>
  <!-- neural net icon -->
  <circle cx="742" cy="97" r="5" fill="#F3E8FF" stroke="#A855F7" stroke-width="1.3"/>
  <circle cx="728" cy="89" r="3" fill="#F3E8FF" stroke="#A855F7" stroke-width="1.1"/>
  <circle cx="756" cy="89" r="3" fill="#F3E8FF" stroke="#A855F7" stroke-width="1.1"/>
  <circle cx="728" cy="105" r="3" fill="#F3E8FF" stroke="#A855F7" stroke-width="1.1"/>
  <circle cx="756" cy="105" r="3" fill="#F3E8FF" stroke="#A855F7" stroke-width="1.1"/>
  <line x1="730" y1="90.5" x2="738.5" y2="94" stroke="#A855F7" stroke-width="0.9"/>
  <line x1="754" y1="90.5" x2="745.5" y2="94" stroke="#A855F7" stroke-width="0.9"/>
  <line x1="730" y1="103.5" x2="738.5" y2="100" stroke="#A855F7" stroke-width="0.9"/>
  <line x1="754" y1="103.5" x2="745.5" y2="100" stroke="#A855F7" stroke-width="0.9"/>
  <text x="742" y="140" text-anchor="middle" font-family="Sora, sans-serif" font-size="10.5" font-weight="700" fill="#6B21A8">LLM Context Window</text>

  <!-- ── QUERY LABEL ── -->
  <text x="240" y="190" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#3B82F6" letter-spacing="1">QUERY</text>

  <!-- ── CAL QUERY CODE CARD ── -->
  <rect x="112" y="200" width="256" height="136" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <!-- line 1: RECALL beliefs -->
  <text x="126" y="222" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#2563EB">RECALL</text>
  <text x="183" y="222" font-family="JetBrains Mono, monospace" font-size="10" fill="#334155"> beliefs</text>
  <!-- line 2: ABOUT "alice" -->
  <text x="138" y="240" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#2563EB">ABOUT</text>
  <text x="182" y="240" font-family="JetBrains Mono, monospace" font-size="10" fill="#334155"> </text>
  <text x="188" y="240" font-family="JetBrains Mono, monospace" font-size="10" fill="#16A34A">"alice"</text>
  <!-- line 3: RECENT 10 -->
  <text x="138" y="258" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#2563EB">RECENT</text>
  <text x="192" y="258" font-family="JetBrains Mono, monospace" font-size="10" fill="#334155"> 10</text>
  <!-- line 4: BUDGET 2000 tokens -->
  <text x="138" y="276" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#2563EB">BUDGET</text>
  <text x="192" y="276" font-family="JetBrains Mono, monospace" font-size="10" fill="#334155"> 2000 </text>
  <text x="236" y="276" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#2563EB">tokens</text>
  <!-- line 5: AS sml -->
  <text x="138" y="294" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#2563EB">AS</text>
  <text x="156" y="294" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#7C3AED"> sml</text>
  <!-- connector line from card to arrow -->
  <line x1="240" y1="163" x2="240" y2="200" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ── OUTPUT LABEL ── -->
  <text x="700" y="190" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#7C3AED" letter-spacing="1">OUTPUT FORMATS</text>

  <!-- ── SML OUTPUT CARD ── -->
  <rect x="580" y="200" width="240" height="56" rx="6" fill="#FDF4FF" stroke="#E9D5FF" stroke-width="1"/>
  <text x="594" y="218" font-family="JetBrains Mono, monospace" font-size="9" fill="#6B21A8">&lt;</text>
  <text x="600" y="218" font-family="JetBrains Mono, monospace" font-size="9" font-weight="600" fill="#6B21A8">belief</text>
  <text x="638" y="218" font-family="JetBrains Mono, monospace" font-size="9" fill="#6B21A8"> confidence=</text>
  <text x="710" y="218" font-family="JetBrains Mono, monospace" font-size="9" fill="#16A34A">"0.94"</text>
  <text x="748" y="218" font-family="JetBrains Mono, monospace" font-size="9" fill="#6B21A8">&gt;</text>
  <text x="606" y="234" font-family="JetBrains Mono, monospace" font-size="9" fill="#6B21A8">prefers dark mode</text>
  <text x="594" y="248" font-family="JetBrains Mono, monospace" font-size="9" fill="#6B21A8">&lt;/</text>
  <text x="608" y="248" font-family="JetBrains Mono, monospace" font-size="9" font-weight="600" fill="#6B21A8">belief</text>
  <text x="646" y="248" font-family="JetBrains Mono, monospace" font-size="9" fill="#6B21A8">&gt;</text>

  <!-- ── MARKDOWN OUTPUT CARD ── -->
  <rect x="580" y="264" width="240" height="44" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="594" y="282" font-family="JetBrains Mono, monospace" font-size="9" font-weight="600" fill="#334155">## Beliefs</text>
  <text x="594" y="298" font-family="JetBrains Mono, monospace" font-size="9" fill="#334155">- </text>
  <text x="608" y="298" font-family="JetBrains Mono, monospace" font-size="9" font-weight="600" fill="#334155">prefers dark mode</text>
  <text x="730" y="298" font-family="JetBrains Mono, monospace" font-size="9" fill="#94A3B8"> (0.94)</text>

  <!-- connector line from cards to arrow -->
  <line x1="700" y1="163" x2="700" y2="200" stroke="#E9D5FF" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ── FORMAT PILLS ── -->
  <rect x="614" y="320" width="32" height="18" rx="9" fill="#F3E8FF"/>
  <text x="630" y="332.5" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" font-weight="600" fill="#7C3AED">sml</text>

  <rect x="652" y="320" width="58" height="18" rx="9" fill="#F1F5F9"/>
  <text x="681" y="332.5" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" font-weight="600" fill="#475569">markdown</text>

  <rect x="716" y="320" width="36" height="18" rx="9" fill="#F1F5F9"/>
  <text x="734" y="332.5" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" font-weight="600" fill="#475569">toon</text>

  <rect x="758" y="320" width="34" height="18" rx="9" fill="#F1F5F9"/>
  <text x="775" y="332.5" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" font-weight="600" fill="#475569">json</text>

  <!-- ── FOOTER ── -->
  <text x="480" y="400" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#CBD5E1" letter-spacing="0.5">Open Memory Specification · memorygrain.org</text>
</svg>
